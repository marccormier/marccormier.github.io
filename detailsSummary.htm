<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
</head>
<style type="text/css">
.dropbtn {
  background-color: #3498DB;
  color: white;
  padding: 16px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}
.dropbtn:hover, .dropbtn:focus {
  background-color: #2980B9;
}
.dropdown {
  position: relative;
  display: inline-block;
}
.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f1f1f1;
  min-width: 160px;
  overflow: auto;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}
.dropdown-content a {
  color: black;
  padding: 10px 14px;
  text-decoration: none;
  display: block;
}
.dropdown a:hover {background-color: #ddd;}
.show {display: block;}
</style>
<body>
<div>
	<main>
		<header><h1></h1></header>
		<nav>
			<div class="dropdown">
  <button onclick="about()" class="dropbtn">A Propos</button>
  <div id="aboutBtn" class="dropdown-content">
    <a href="#about">Marc CORMIER</a>
  </div>
</div>
		</nav>
	</main>
</div>
<script type="text/javascript">
function about() {document.getElementById("aboutBtn").classList.toggle("show");}
</script>
</body>
</html>
