<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style type="text/css">
		.move{
			-moz-transform:translate(250px,50px);
			-webkit-transform:translate(250px,50px);
			-o-transform:translate(250px,50px);
			transform:translate(250px,50px);
		}
		.hidden{display:none;}
	</style>
</head>
<body>
<label onclick="show()">Label</label>
<div id="elemId" class="hidden">
	<h1>test</h1>
	<p>css4 translate div</p>
</div>
<script type="text/javascript">
var element = document.getElementById("elemId");
function show() {
element.setAttribute("class", "move");
}
</script>
</body>
</html>
