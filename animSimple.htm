<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<script type="text/javascript" src="content/js/osc.js"></script>
	<style type="text/css">
		#carre{
			position:absolute;
			background:orange;
			border:1px solid red;
		}
	</style>
</head>
<body>
<div id="carre"></div>
<script type="text/javascript">
TAILLE = GAUCHE = 0
setInterval(animer, 30)
function animer()
{
	TAILLE += 10
	GAUCHE += 3

	if (TAILLE == 200) TAILLE = 0
	if (GAUCHE == 600) GAUCHE = 0

	S('carre').width = TAILLE + 'px'
	S('carre').height = TAILLE + 'px'
	S('carre').left = GAUCHE + 'px'
}
</script>
</body>
</html>
