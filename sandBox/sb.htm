<html>
<body>
   <h2> Using the <i> innerHTML property </i> to insert a script </h2>
   <label> Enter a number: </label>
   <input type = "number" id = "number" name = "Number" value = "0" /> <br>
   <button id = "btn" onclick = "func()"> Submit </button>
   <textarea id = "div"> </textarea>
   <script>
      function func() {
         //Adding a script using innerHTML that will execute
         var script = document.createElement("script");
         script.innerHTML =
         "var value = document.getElementById('div').value; document.getElementById('div').innerHTML = value;";
         div.appendChild(script);
         div.style.color = "red";
      }
   </script>
</body>
</html>
