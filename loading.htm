	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>loading...</title>
	<script type="text/javascript" src="content/js/OSC.js"></script>
	<style type="text/css">
		#carre{
			position:absolute;
			background:orange;
			border:1px solid red;
		}
	</style>
</head>
<body onload="setInterval(animer, 30)">
<div id="carre"></div>
<script type="text/javascript">
TAILLE = GAUCHE = 0
function animer()
{
	TAILLE += 10
	GAUCHE += 3

	if (TAILLE == 200) TAILLE = 0
	if (GAUCHE == 600) GAUCHE = 0

	S('carre').width = TAILLE + 'px'
	S('carre').height = TAILLE + 'px'
	S('carre').left = GAUCHE + 'px'
}
</script>
<script type="text/javascript">
	setInterval(
function () {
  var randomColor = Math.floor(Math.random()*16777215).toString(16);
  document.body.style.backgroundColor = "#"+randomColor;
},1000);
</script>
</body>
</html>
